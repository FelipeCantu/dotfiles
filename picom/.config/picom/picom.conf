	
	backend = "xrender";
	vsync = false;
	
	shadow = true;
	shadow-radius = 12;
	shadow-opacity = 0.45;
	shadow-offset-x = -12;
	shadow-offset-y = -12;
	shadow-exclued = [
		"class_g = 'i3-frame'",
		"_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
	];
	
	fading = true;
	fade-in-step = 0.04;
	fade-out-step =0.04;
	fade-delta = 4;

	corner-radius = 4;
	rounded-corners-exclued = [
		"window_type = 'dock'"
	];

	blur-method = "none";

	mark-wmwin-focused = true;
	mark-ovredir-focused = true;
	detect-rounded-corners = true;
	detect-client-opacity = true;
	detect-transient = true;
	use-damage = false;
