 [colors]
 background = #2e3440
 foreground = #d8dee9
 primary = #88c0d0
 alert = #bf616a
 green = #a3be8c
 yellow = #ebcb8b


 [bar/main]
 width = 100%
 height = 26
 background = ${colors.background}
 foreground = ${colors.foreground}
 line-size = 2
 padding-left = 1
 padding-right = 1
 module-margin = 1
 font-0 = monospace:size=10
 modules-left = i3
 modules-right = load cpu memory filesystem date
 tray-position = right


 [module/i3]
 type = internal/i3
 format = <label-state>
 label-focused = %name%
 label-focused-foreground = ${colors.primary}
 label-unfocused = %name%
 label-urgent = %name%
 label-urgent-foreground = ${colors.alert}

 [module/cpu]
 type = internal/cpu
 interval = 2
 format = CPU: <label>
 label = %percentage%%

 [module/memory]
 type = internal/memory
 interval = 2 
 format = RAM: <label>
 label = %percentage_used%%

 [module/filesystem]
 type = internal/fs
 mount-0 = /
 interval = 30
 label-mounted = Disk: %percentage_used%%

 [module/load]
 type = custom/script
 exec = awk '{print "Load: "$1}' /proc/loadavg
 interval = 5

 [module/date]
 type = internal/date
 interval = 1
 date = %Y-%m-%d %H:%M:%S
 label = %date%
